<custom-header />
<main>
  @if (isLoading) {
  <loading />
  } @else if (currentUser){
  <h1>BEM VINDO {{currentUser.name}}</h1>
  @if (allGroups.length > 0) {
  <custom-list
    [allElements]="allGroups"
    [navigate]="viewGroupDetails.bind(this)"
    [findNext]="findNextGroups.bind(this)"
    [delete]="deleteGroup.bind(this)"
    type="grupo"
  />}@else {
  <h3>NENHUM GRUPO CADASTRADO</h3>
  } }
</main>
