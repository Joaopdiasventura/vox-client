<custom-header />
<main>
  @if (isLoading) {
  <loading />
  } @else if (modalConfig && modalConfig.isVisible) {
  <modal
    [isVisible]="modalConfig.isVisible"
    [icon]="modalConfig.icon"
    [title]="modalConfig.title"
    [onClose]="modalConfig.onClose"
  >
    {{modalConfig.children}}
  </modal>
  } @else {
  <form [formGroup]="selectForm">
    <custom-select
      formControlName="group"
      id="group"
      label="Selecione um grupo para iniciar"
      default="selecione"
      [options]="currentGroups"
    />
  </form>
  <form [formGroup]="urnForm" (ngSubmit)="allowVote()">
    <custom-input formControlName="urn" label="ID da Urna:" id="urn" />
    <custom-button type="submit">Autorizar</custom-button>
  </form>
  <custom-button [onClick]="exitVote.bind(this)">Sair</custom-button>
  }
</main>
