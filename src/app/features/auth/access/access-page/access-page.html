@if (isLoading) {
<loading />
} @else { @if (modalConfig && modalConfig.isVisible) {
<modal
  [isVisible]="modalConfig.isVisible"
  [icon]="modalConfig.icon"
  [title]="modalConfig.title"
  [onClose]="modalConfig.onClose.bind(this)"
>
  {{modalConfig.children}}
</modal>
}
<main>
  <img src="svg/red/full-logo-icon.svg" alt="" />
  <div class="form-selection">
    <div
      class="switch-bg"
      [ngStyle]="{ transform: isInLogin ? 'translate(5%, -50%)' : 'translate(115%, -50%)' }"
    ></div>
    <button type="button" (click)="isInLogin = true" [class.active]="isInLogin">
      login
    </button>
    <button
      type="button"
      (click)="isInLogin = false"
      [class.active]="!isInLogin"
    >
      cadastro
    </button>
  </div>

  <div class="forms-container">
    <div class="forms-wrapper">
      <form [formGroup]="loginForm" autocomplete="off" (ngSubmit)="login()">
        <custom-input
          formControlName="email"
          type="email"
          name="login-email"
          id="login-email"
          label="Email"
          placeholder="Digite seu email"
          icon="svg/white/email-input-icon.svg"
          [required]="true"
        />
        <custom-input
          formControlName="password"
          type="password"
          name="login-password"
          id="login-password"
          label="password"
          placeholder="Digite sua senha"
          icon="svg/white/password-input-icon.svg"
          [required]="true"
        />
        <custom-button>entrar</custom-button>
      </form>
      <form [formGroup]="createForm" autocomplete="off" (ngSubmit)="create()">
        <custom-input
          formControlName="name"
          type="name"
          name="create-name"
          id="create-name"
          label="name"
          placeholder="Digite seu nome"
          icon="svg/white/name-input-icon.svg"
          [required]="true"
        />
        <custom-input
          formControlName="email"
          type="email"
          name="create-email"
          id="create-email"
          label="Email"
          placeholder="Digite seu email"
          icon="svg/white/email-input-icon.svg"
          [required]="true"
        />
        <custom-input
          formControlName="password"
          type="password"
          name="create-password"
          id="create-password"
          label="password"
          placeholder="Digite sua senha"
          icon="svg/white/password-input-icon.svg"
          [required]="true"
        />
        <custom-button>cadastrar</custom-button>
      </form>
    </div>
  </div>
</main>
}
