<main class="verify-page">
  <modal
    icon="svg/white/ballot-box-icon.svg"
    title="Verifique seu e-mail"
    [showButton]="false"
  >
    <p>
      Enviamos um link de confirmação para o email
      <strong>{{ currentUser?.email }}</strong>. Por favor, verifique ele
      clicando no botão para continuar
    </p>
  </modal>
</main>
