<custom-header />
<main>
  @if (isLoading) {
  <loading />
  } @else if (modalConfig && modalConfig.isVisible) {
  <modal
    [isVisible]="modalConfig.isVisible"
    [icon]="modalConfig.icon"
    [title]="modalConfig.title"
    [onClose]="modalConfig.onClose"
  >
    {{modalConfig.children}}
  </modal>
  } @else {
  <h2>Adicionar Grupo</h2>
  <form [formGroup]="createForm" autocomplete="off" (ngSubmit)="create()">
    <custom-input
      formControlName="name"
      id="create-name"
      placeholder="nome"
      label="Digite um nome"
    />
    @if (currentGroups.length > 0) {
    <custom-select
      formControlName="group"
      id="group"
      label="ESCOLHA UM GRUPO (opcional)"
      default="selecione"
      [options]="currentGroups"
    />
    }
    <custom-button>CRIAR</custom-button>
  </form>
  }
</main>
