@if ( modalConfig.isVisible ) {
<modal-question
  [isVisible]="modalConfig.isVisible"
  [title]="modalConfig.title"
  [confirm]="deleteElement.bind(this)"
  [deny]="modalConfig.onDeny"
>
  <p>{{modalConfig.children}}</p>
</modal-question>
} @else if(allElements && allElements[0] && allElements[0].length > 0){
<div class="elements-container">
  <button
    [class]="(currentPage < 1 ? 'disable ' : '') + 'page-btn'"
    (click)="usePrev()"
  >
    <-
  </button>
  <div class="elements-list">
    @for (element of allElements[currentPage]; track element._id; let i =
    $index) {
    <div class="elements-card">
      <h3 (click)="navigateToElement(element._id)">{{ element.name }}</h3>
      <button (click)="openModal(element)">×</button>
    </div>
    }
  </div>
  <button
    [class]="
      (!allElements[currentPage + 1] || allElements[currentPage + 1].length === 0
        ? 'disable '
        : '') + 'page-btn'
    "
    (click)="useNext()"
  >
    ->
  </button>
</div>
}
